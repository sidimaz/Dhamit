<!DOCTYPE html>

<html>
<head><meta charset="UTF-8"><title>Trouver Entry IDs</title>
<style>
body{background:#111;color:#eee;font-family:monospace;padding:20px}
button{background:#C9933A;color:#000;border:none;padding:12px 20px;font-size:16px;border-radius:8px;margin:10px 0;display:block;width:100%;cursor:pointer}
#result{background:#222;padding:15px;border-radius:8px;margin-top:15px;font-size:13px;word-break:break-all}
</style>
</head>
<body>
<h2>🔍 Trouver les Entry IDs</h2>
<p>Appuyez le bouton — la page va charger le formulaire et extraire les IDs</p>
<button onclick="findIds()">🔍 Trouver les IDs</button>
<div id="result">En attente...</div>
<script>
async function findIds(){
  document.getElementById('result').textContent = '⏳ Chargement...';
  try {
    const url = 'https://docs.google.com/forms/d/e/1FAIpQLSe9iEABXdCUue_7krbDsXiMmCJDRwQhuTnogb9PFLiPMaJ_Pw/viewform';
    const r = await fetch(url);
    const text = await r.text();
    // Chercher les entry IDs
    const entries = [...text.matchAll(/entry\.(\d+)/g)].map(m=>m[1]);
    const unique = [...new Set(entries)];
    // Chercher les noms de champs
    const fields = [...text.matchAll(/"([^"]+)",\d+,\d+,\[\[(\d+)/g)].map(m=>({name:m[1],id:m[2]}));

```
let output = '=== ENTRY IDs ===\n';
unique.forEach((id,i) => output += `entry.${id}\n`);
output += '\n=== CHAMPS ===\n';
fields.forEach(f => output += `${f.name}: entry.${f.id}\n`);

document.getElementById('result').textContent = output || 'Aucun ID trouvé - CORS bloqué';
```

} catch(e) {
document.getElementById(‘result’).textContent = ’❌ Erreur: ’ + e.message + ‘\n\nCORS bloqué - utilisez la méthode manuelle’;
}
}
</script>

</body>
</html>
