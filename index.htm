<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test boutons</title>
<style>
body{background:#130E04;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
button{background:#C9933A;color:#000;border:none;padding:20px 40px;font-size:20px;border-radius:10px;cursor:pointer;display:block;margin:10px}
#result{color:#fff;font-size:18px;margin-top:20px;text-align:center}
</style>
</head>
<body>
<div>
  <button onclick="test1()">♟ Jeu local</button>
  <button onclick="test2()">🤖 Contre IA</button>
  <button onclick="test3()">📖 Règles</button>
  <div id="result">Appuyez un bouton...</div>
</div>
<script>
'use strict';

function test1(){ document.getElementById(‘result’).textContent = ‘✅ Jeu local marche!’; }
function test2(){ document.getElementById(‘result’).textContent = ‘✅ IA marche!’; }
function test3(){ document.getElementById(‘result’).textContent = ‘✅ Règles marche!’; }

window.addEventListener(‘load’, function(){
document.getElementById(‘result’).textContent = ‘JS chargé - appuyez un bouton’;
});
</script>

</body>
</html>
